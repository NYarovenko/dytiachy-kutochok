<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дитячий Куточок — React Store</title>
    
    <!-- Підключаємо React та Babel -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        /* Ваші стилі залишаються тими ж самими */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: #FFF9F0; color: #2c2c2c; }
        .topbar { background: #fff; border-bottom: 3px solid #FFD93D; position: sticky; top: 0; z-index: 100; padding: 10px 20px; }
        .topbar-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); }
        .card-img { height: 180px; background: #eee; display: flex; align-items: center; justify-content: center; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 15px; }
        .price { color: #FF6B6B; font-weight: bold; font-size: 1.2rem; }
        .cart-btn { background: #FF6B6B; color: #fff; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; }
        .to-cart-btn { background: #4D96FF; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        /* Стилі модального вікна */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #fff; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .cart-item img { width: 40px; height: 40px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [loading, setLoading] = useState(true);

            // 1. Завантаження даних (вкажіть своє посилання)
            useEffect(() => {
                fetch('ВАШЕ_ПОСИЛАННЯ_НА_APPS_SCRIPT')
                    .then(res => res.json())
                    .then(data => {
                        setProducts(data);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) {
                        return prev.map(item => item.id === product.id ? {...item, qty: item.qty + 1} : item);
                    }
                    return [...prev, {...product, qty: 1}];
                });
            };

            const removeFromCart = (id) => {
                setCart(prev => prev.filter(item => item.id !== id));
            };

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            return (
                <div>
                    <header className="topbar">
                        <div className="topbar-inner">
                            <h2 style={{fontFamily: 'Baloo 2', color: '#FF6B6B'}}>👶 Куточок</h2>
                            <button className="cart-btn" onClick={() => setIsCartOpen(true)}>
                                🛒 Кошик ({cart.reduce((a, b) => a + b.qty, 0)})
                            </button>
                        </div>
                    </header>

                    <main className="grid">
                        {loading ? <p>Завантаження товарів...</p> : 
                            products.map(item => (
                                <div key={item.id} className="card">
                                    <div className="card-img">
                                        {item.icon && item.icon.includes('http') ? 
                                            <img src={item.icon.trim()} alt={item.name} /> : 
                                            <span style={{fontSize: '3rem'}}>{item.icon || '📦'}</span>
                                        }
                                    </div>
                                    <div className="card-body">
                                        <h4>{item.name}</h4>
                                        <p style={{fontSize: '0.8rem', color: '#888'}}>{item.desc}</p>
                                        <div style={{display: 'flex', justifyContent: 'space-between', marginTop: '10px'}}>
                                            <span className="price">{item.price} грн</span>
                                            <button className="to-cart-btn" onClick={() => addToCart(item)}>+</button>
                                        </div>
                                    </div>
                                </div>
                            ))
                        }
                    </main>

                    {isCartOpen && (
                        <div className="modal-overlay" onClick={() => setIsCartOpen(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <h3>Ваш кошик</h3>
                                <hr style={{margin: '10px 0'}} />
                                {cart.length === 0 ? <p>Порожньо 😔</p> : (
                                    <>
                                        {cart.map(item => (
                                            <div key={item.id} className="cart-item">
                                                <div style={{display: 'flex', gap: '10px', alignItems: 'center'}}>
                                                    {item.icon.includes('http') ? <img src={item.icon} /> : <span>{item.icon}</span>}
                                                    <span>{item.name} x{item.qty}</span>
                                                </div>
                                                <div>
                                                    <span style={{fontWeight: 'bold'}}>{item.price * item.qty} грн</span>
                                                    <button onClick={() => removeFromCart(item.id)} style={{marginLeft: '10px', border: 'none', background: 'none', cursor: 'pointer'}}>✕</button>
                                                </div>
                                            </div>
                                        ))}
                                        <div style={{textAlign: 'right', marginTop: '20px', fontWeight: 'bold', fontSize: '1.2rem'}}>
                                            Разом: {total} грн
                                        </div>
                                        <button className="cart-btn" style={{width: '100%', marginTop: '15px'}} onClick={() => alert('Дякуємо за замовлення!')}>
                                            Оформити замовлення
                                        </button>
                                    </>
                                )}
                                <button onClick={() => setIsCartOpen(false)} style={{width: '100%', marginTop: '10px', background: '#eee', border: 'none', padding: '10px', borderRadius: '50px', cursor: 'pointer'}}>Закрити</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
